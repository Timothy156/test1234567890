name: APK Test

on:
  workflow_call:
    inputs:
      build-run-id:
        description: 'Run ID of the build workflow that uploaded debug APKs'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      build-run-id:
        description: 'Run ID of the build workflow to download APKs from'
        required: true
        type: string

jobs:
  instrumentation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # ── All parameters that affect snapshot compatibility ──
    # Changing any value here triggers a cache miss via the hash in the cache key.
    env:
      EMU_OPTIONS: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -skin 1080x1920
      EMU_DISK_SIZE: 2G
      EMU_HEAP_SIZE: 1G

    strategy:
      fail-fast: false
      matrix:
        api-level: [30]
        arch: [x86_64]
        target: [google_apis]

    steps:
      # ── Download pre-built debug APKs from build workflow ──
      - name: Download debug APKs
        uses: actions/download-artifact@v4
        with:
          name: debug-apks
          path: apks/
          run-id: ${{ inputs.build-run-id || github.run_id }}

      # ── Verify APKs exist ──
      - name: Verify APKs
        run: |
          echo "=== Directory listing ==="
          ls -lR apks/ || echo "NOTE: apks/ not found or empty"
          echo ""

          # Detect ZIP files (artifact may not have been extracted)
          ZIP_COUNT=$(find apks/ -name "*.zip" 2>/dev/null | wc -l)
          if [ "$ZIP_COUNT" -gt 0 ]; then
            echo "⚠️  Found $ZIP_COUNT ZIP file(s) — artifact was NOT extracted"
            find apks/ -name "*.zip" -exec ls -lh {} \;
            echo "Unzipping..."
            find apks/ -name "*.zip" -exec sh -c 'cd "$(dirname "$1")" && unzip -o "$(basename "$1")"' _ {} \;
            echo "=== After unzip ==="
            ls -lR apks/
            echo ""
          fi

          APK_COUNT=$(find apks/ -name "*.apk" 2>/dev/null | wc -l)
          echo "APK count: $APK_COUNT"
          find apks/ -name "*.apk" 2>/dev/null -exec ls -lh {} \;
          if [ "$APK_COUNT" -lt 2 ]; then
            echo "❌ Expected 2 APK files (app + test), found $APK_COUNT"
            exit 1
          fi
          echo "✅ APKs ready"

      # ── Enable KVM ──
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Hash all AVD params → cache key ──
      - name: Compute AVD params hash
        id: emu-hash
        run: |
          echo "hash=$(echo '${{ matrix.api-level }} ${{ matrix.arch }} ${{ matrix.target }} ${{ env.EMU_OPTIONS }} ${{ env.EMU_DISK_SIZE }} ${{ env.EMU_HEAP_SIZE }}' | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      # ── AVD cache ──
      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ steps.emu-hash.outputs.hash }}-v2

      # ── Create clean AVD + snapshot (only on cache miss) ──
      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          disk-size: ${{ env.EMU_DISK_SIZE }}
          heap-size: ${{ env.EMU_HEAP_SIZE }}
          emulator-options: ${{ env.EMU_OPTIONS }}
          disable-animations: false
          script: echo "AVD snapshot generated for caching."

      # ── Write test script ──
      - name: Write test script
        run: |
          cat > test-script.sh << 'SCRIPT_EOF'
          #!/bin/sh
          set -eu

          APKS="apks"
          echo "Searching APKs in $PWD/$APKS ..."
          ls -la "$APKS"/

          MAIN_APK="$(find "$APKS" -name '*.apk' ! -name '*androidTest*' ! -name '*test*' | head -1)"
          TEST_APK="$(find "$APKS" -name '*androidTest*.apk' -o -name '*test*.apk' | head -1)"

          # ── logcat capture helpers ──

          logcat_snapshot() {
            local TAG="$1"
            local OUTFILE="logcat-${TAG}.txt"
            {
              echo "=== Phase: $TAG ==="
              echo "=== logcat (errors & crash) ==="
              adb logcat -d -s AndroidRuntime:E System.err:W '*:F' DEBUG:I ActivityManager:I 2>/dev/null || true
              echo ""
              echo "=== logcat (dreamandroid) ==="
              adb logcat -d 2>/dev/null | grep -E "io\.github\.dreamandroid" || echo "(no matching lines)"
              echo ""
              echo "=== tombstone (native crash) ==="
              adb shell ls -t /data/tombstones/ 2>/dev/null | head -3 | while read f; do
                echo "--- $f ---"
                adb shell cat "/data/tombstones/$f" 2>/dev/null || true
              done
              echo ""
              echo "=== dumpsys meminfo ==="
              adb shell dumpsys meminfo io.github.dreamandroid.local 2>/dev/null | head -30 || true
            } > "$OUTFILE"
            echo "  logcat snapshot → $OUTFILE"
          }

          capture_final_logcat() {
            logcat_snapshot "final"
          }
          trap capture_final_logcat EXIT

          # ── installer helper ──

          install_apks() {
            echo "Cleaning old packages..."
            adb uninstall io.github.dreamandroid.local || true
            adb uninstall io.github.dreamandroid.local.test || true
            echo "Installing: $MAIN_APK"
            adb install -r -g "$MAIN_APK"
            echo "Installing: $TEST_APK"
            adb install -r -g "$TEST_APK"
          }

          # ── run single test class ──

          run_class() {
            local CLASS="$1"
            local PHASE="$2"
            echo ""
            echo "==================== $PHASE ===================="
            echo "Class: $CLASS"

            adb logcat -c || true  # clear logcat before test
            logcat_snapshot "${PHASE}-before"

            local OUT
            OUT="$(adb shell am instrument -w -r \
              -e class "$CLASS" \
              io.github.dreamandroid.local.test/androidx.test.runner.AndroidJUnitRunner 2>&1)" || true
            echo "$OUT"

            logcat_snapshot "${PHASE}-after"

            # Check for failures
            if echo "$OUT" | grep -qE "(FAILURES!!|INSTRUMENTATION_STATUS_CODE: -2|INSTRUMENTATION_RESULT: shortMsg=)"; then
              echo "❌ $PHASE: FAILED"
              return 1
            fi
            echo "✅ $PHASE: PASSED"
            return 0
          }

          OVERALL_FAILED=0

          # ─────────────────────────────────────────────────
          # Phase 1 — QueueProgressCrashTest (dedicated, with crash debugging)
          #   Simulates fake backend HTTP progress updates into task queue.
          #   Primary crash surface: progress display in Queue tab during
          #   Compose recomposition triggered by StateFlow.update{}.
          # ─────────────────────────────────────────────────
          install_apks

          if ! run_class "io.github.dreamandroid.local.QueueProgressCrashTest" "QueueProgressCrash"; then
            OVERALL_FAILED=1
          fi

          # ─────────────────────────────────────────────────
          # Phase 2 — Remaining instrumentation tests
          #   AppLaunchInstrumentationTest, etc.
          # ─────────────────────────────────────────────────
          # Reinstall to ensure clean state after QueueProgressCrashTest
          adb uninstall io.github.dreamandroid.local || true
          sleep 1
          echo "Installing: $MAIN_APK"
          adb install -r -g "$MAIN_APK"

          echo "Running remaining tests..."
          logcat_snapshot "remaining-before"

          REM_OUT="$(adb shell am instrument -w -r \
            -e package io.github.dreamandroid.local \
            -e notClass io.github.dreamandroid.local.QueueProgressCrashTest \
            io.github.dreamandroid.local.test/androidx.test.runner.AndroidJUnitRunner 2>&1)" || true
          echo "$REM_OUT"

          logcat_snapshot "remaining-after"

          if echo "$REM_OUT" | grep -qE "(FAILURES!!|INSTRUMENTATION_STATUS_CODE: -2|INSTRUMENTATION_RESULT: shortMsg=)"; then
            echo "❌ Remaining tests: FAILED"
            OVERALL_FAILED=1
          else
            echo "✅ Remaining tests: PASSED"
          fi

          # ── Pull tab screenshots (captured by TabNavigationSmokeTest) ──
          echo "Pulling tab screenshots..."
          mkdir -p screenshots

          for TAB in Models Queue Generate Upscale Gallery; do
            adb pull "/sdcard/tab_${TAB}.png" "screenshots/" 2>/dev/null && \
              echo "✅ Pulled $TAB" || \
              echo "WARNING: pull $TAB failed (file may not exist)"
          done

          echo "=== Screenshots pulled ==="
          ls -l screenshots/ || echo "WARNING: no screenshots directory"

          if [ "$OVERALL_FAILED" -eq 1 ]; then
            echo ""
            echo "❌ ONE OR MORE TEST PHASES FAILED"
            exit 1
          fi
          echo ""
          echo "✅ ALL TESTS PASSED"
          SCRIPT_EOF
          chmod +x test-script.sh

      # ── Run tests ──
      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: ${{ matrix.arch }}
          target: ${{ matrix.target }}
          force-avd-creation: false
          disk-size: ${{ env.EMU_DISK_SIZE }}
          heap-size: ${{ env.EMU_HEAP_SIZE }}
          emulator-options: -no-snapshot-save ${{ env.EMU_OPTIONS }}
          disable-animations: true
          script: sh ./test-script.sh

      # ── Screenshots captured by TabNavigationSmokeTest during instrumentation ──

      # ── Upload tab screenshots ──
      - name: Upload tab screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tab-screenshots-${{ matrix.api-level }}-${{ matrix.target }}
          path: screenshots/
          retention-days: 7

      # ── Upload logcat(s) ──
      - name: Upload logcat (QueueProgressCrash before/after)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: logcat-crash-${{ matrix.api-level }}-${{ matrix.target }}
          path: |
            logcat-QueueProgressCrash-before.txt
            logcat-QueueProgressCrash-after.txt
          retention-days: 7

      - name: Upload logcat (remaining tests + final)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logcat-${{ matrix.api-level }}-${{ matrix.target }}
          path: |
            logcat-remaining-before.txt
            logcat-remaining-after.txt
            logcat-final.txt
          retention-days: 7

      # ── Upload test reports ──
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.api-level }}-${{ matrix.target }}
          path: app/build/reports/androidTests/connected/**
          retention-days: 7
