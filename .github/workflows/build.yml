name: Build Android APK

on:
  push:
    branches: [master, main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [master, main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      cmake_libs:
        description: 'Build native C++ libs (downloads Qualcomm SDK)'
        type: boolean
        default: true
      qairt_sdk_variant:
        description: 'Qualcomm SDK to build against'
        type: choice
        options:
          - qairt-2.48.0.260626
          - qnn-2.31.0.250130
        default: qairt-2.48.0.260626
      apk_debug:
        description: 'Build debug APK'
        type: boolean
        default: true
      apk_release:
        description: 'Build release APK (R8 minify on)'
        type: boolean
        default: false
      apk_test:
        description: 'Run emulator instrumentation tests (requires apk_debug)'
        type: boolean
        default: false
      github_release:
        description: 'Publish APK as GitHub Release (requires apk_release)'
        type: boolean
        default: false
      verbose_logging:
        description: 'Enable info/warn log output (--info instead of --quiet)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Stage 1 — C++ Native Build (reusable)
  # ============================================================
  cmake:
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.cmake_libs == 'true') }}
    uses: ./.github/workflows/apk-cmake.yml
    with:
      qairt_sdk_url: ${{ github.event.inputs.qairt_sdk_variant == 'qnn-2.31.0.250130' && 'https://softwarecenter.qualcomm.com/api/download/software/qualcomm_neural_processing_sdk/v2.31.0.250130.zip' || 'https://softwarecenter.qualcomm.com/api/download/software/sdks/Qualcomm_AI_Runtime_Community/All/2.48.0.260626/v2.48.0.260626.zip' }}

  # ============================================================
  # Stage 2a — Gradle Debug
  # ============================================================
  gradle-debug:
    needs: cmake
    if: |
      always() &&
      !cancelled() &&
      (needs.cmake.result == 'success' || needs.cmake.result == 'skipped') &&
      (
        (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')) ||
        github.event_name == 'pull_request' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.apk_debug == 'true')
      )
    uses: ./.github/workflows/apk-gradle.yml
    with:
      build-type: debug
      verbose-logging: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.verbose_logging == 'true' }}

  # ============================================================
  # Stage 2b — Gradle Release
  # ============================================================
  gradle-release:
    needs: cmake
    if: |
      always() &&
      !cancelled() &&
      (needs.cmake.result == 'success' || needs.cmake.result == 'skipped') &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.apk_release == 'true')
      )
    uses: ./.github/workflows/apk-gradle.yml
    with:
      build-type: release
      verbose-logging: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.verbose_logging == 'true' }}

  # ============================================================
  # Stage 3 — Emulator Test
  # ============================================================
  test:
    needs: gradle-debug
    if: |
      always() &&
      needs.gradle-debug.result == 'success' &&
      (
        (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.apk_test == 'true')
      )
    uses: ./.github/workflows/apk-test.yml
    with:
      build-run-id: ${{ github.run_id }}

  # ============================================================
  # Stage 4 — GitHub Release
  # ============================================================
  github-release:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: gradle-release
    if: |
      always() &&
      !cancelled() &&
      needs.gradle-release.result == 'success' &&
      (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.github_release == 'true')
      )

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: dreamandroid-APK

      - name: Rename APK for release
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          for f in dreamandroid_armv8a_*.apk; do
            if [ -f "$f" ]; then
              NEW="DreamHub-${VERSION}-arm64-v8a-release.apk"
              mv "$f" "$NEW"
              echo "Renamed $f → $NEW"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: DreamHub-*-arm64-v8a-release.apk
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ endsWith(github.ref, '-rc') }}
